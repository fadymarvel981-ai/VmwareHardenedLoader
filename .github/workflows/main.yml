name: Build-Hardened-Loader
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Strip Kernel Dependency
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
          (Get-Content $_.FullName) -replace 'CAPSTONE_WINKERNEL;', '' | Set-Content $_.FullName
        }

    - name: Build Solution
      run: |
        msbuild VmLoader.sln `
        /p:Configuration=Release `
        /p:Platform=x64 `
        /p:WindowsTargetPlatformVersion=10.0 `
        /p:PlatformToolset=v143

    - name: Archive Results
      uses: actions/upload-artifact@v4
      with:
        name: My-Hardened-Loader
        path: |
          **\Release\VmLoader.exe
          **\Release\VmLoader.sys
