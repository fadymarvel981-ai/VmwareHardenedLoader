name: Build-Hardened-Loader
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Detect SDK and Build
      shell: pwsh
      run: |
        
        $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Include\"
        $sdkVersion = (Get-ChildItem $sdkPath | Where-Object { $_.Name -match '^10\.0\.' } | Sort-Object Name -Descending | Select-Object -First 1).Name
        
        Write-Host "Detected SDK Version on Server: $sdkVersion"
        
       
        msbuild VmLoader.sln `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=$sdkVersion `
          /p:PlatformToolset=v143

    - name: Archive Results
      uses: actions/upload-artifact@v4
      with:
        name: Hardened-Loader-Final
        path: |
          **\x64\Release\VmLoader.exe
          **\x64\Release\VmLoader.sys
